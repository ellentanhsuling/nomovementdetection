# Fall Detection Configuration Template
# Use this as a reference for the structure of your config.yaml file
# Fill in the values and customize as needed

# Sensor Configuration
sensors:
  # Camera Module Settings (faster for real-time detection)
  camera:
    enabled: true
    check_interval: 1  # seconds - real-time for fall detection
    resolution: [640, 480]
    fps: 10
    motion_threshold: 0.1
    person_detection_confidence: 0.7
    include_frame_for_pose: false  # true when NPU backend needs frames (Hailo on Pi)

# Fall Detection Settings
detection:
  # Fall detection parameters
  position_change_threshold: 0.5  # 0.0-1.0
  floor_detection_enabled: true
  fall_confirmation_time: 10  # seconds - time person must be on floor
  pose_estimation_enabled: false  # true + inference.backend mock|hailo
  prefer_pose_when_available: true
  
  # Real-time processing
  frame_analysis_interval: 1  # seconds
  motion_sensitivity: 0.1
  
  # Alert settings
  immediate_alert_on_fall: true
  alert_all_channels: true  # No escalation delay for falls

# Pose / NPU (shared/inference/) — mock without Pi; hailo on Pi
inference:
  backend: none   # none | mock | hailo
  mock:
    scenario: standing
    fall_sequence_standing_frames: 3
  hailo:
    hef_path: ""

# Alert Configuration (same structure as non-movement)
alerts:
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    use_tls: true
    from_email: ""
    to_emails: []
  
  sms:
    enabled: false
    twilio_account_sid: ""
    twilio_auth_token: ""
    twilio_from_number: ""
    to_numbers: []
  
  api:
    enabled: true
    endpoint: "http://localhost:5000/api/alerts"
    timeout: 5
    retry_attempts: 3
    retry_delay: 2

# Logging Configuration
logging:
  level: "INFO"
  file: "logs/monitoring.log"
  max_file_size_mb: 10
  backup_count: 5
  console_output: true

# System Settings
system:
  use_mock_sensors: true  # Set to false when using real Raspberry Pi
  data_directory: "data"
  health_check_interval: 300
  alert_on_system_failure: true

# Privacy Settings
privacy:
  store_images: false
  store_video: false
  image_retention_seconds: 0
  process_locally_only: true
  blur_faces: false
  anonymize_data: true
