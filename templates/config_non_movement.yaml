# Non-Movement Detection Configuration Template
# Use this as a reference for the structure of your config.yaml file
# Fill in the values and customize as needed

# Sensor Configuration
sensors:
  # Camera Module Settings
  camera:
    enabled: true
    check_interval: 30  # seconds between frame captures
    resolution: [640, 480]  # width, height in pixels
    fps: 10
    motion_threshold: 0.1  # 0.0-1.0
    person_detection_confidence: 0.7  # 0.0-1.0

# Monitoring Settings
monitoring:
  # Time thresholds (in minutes)
  no_movement_threshold_active: 30  # Alert if no movement for X min during active hours
  no_movement_threshold_sleep: 120   # Alert if no movement for X min during sleep hours
  no_movement_threshold_anytime: 60 # Alert if no movement for X min at any time
  
  # Active hours (when person is expected to be active)
  active_hours:
    start: 7   # 7 AM
    end: 22    # 10 PM
  
  # Sleep hours (when person is expected to sleep)
  sleep_hours:
    start: 22  # 10 PM
    end: 7     # 7 AM
  
  # Camera-based detection
  require_person_confirmation: true
  motion_consensus_frames: 3
  
  # Pattern learning
  enable_pattern_learning: true
  learning_period_days: 7
  baseline_establishment_days: 3

# Alert Configuration
alerts:
  # Email Alerts
  email:
    enabled: false  # Set to true when ready
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    use_tls: true
    from_email: ""  # Set in .env file
    to_emails: []   # List of email addresses
  
  # SMS Alerts (Twilio - optional)
  sms:
    enabled: false
    twilio_account_sid: ""  # Set in .env file
    twilio_auth_token: ""   # Set in .env file
    twilio_from_number: ""  # Set in .env file
    to_numbers: []          # List of phone numbers
  
  # HTTP API Alerts
  api:
    enabled: true
    endpoint: "http://localhost:5000/api/alerts"
    timeout: 5
    retry_attempts: 3
    retry_delay: 2
  
  # Alert Escalation
  escalation:
    enabled: true
    levels:
      - delay_minutes: 5
        channels: ["email"]
      - delay_minutes: 15
        channels: ["email", "sms"]
      - delay_minutes: 30
        channels: ["email", "sms", "api"]

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/monitoring.log"
  max_file_size_mb: 10
  backup_count: 5
  console_output: true

# System Settings
system:
  use_mock_sensors: true  # Set to false when using real Raspberry Pi
  data_directory: "data"
  event_history_file: "data/events.json"
  movement_patterns_file: "data/patterns.json"
  health_check_interval: 300
  alert_on_system_failure: true

# Privacy Settings
privacy:
  store_images: false
  store_video: false
  image_retention_seconds: 0
  process_locally_only: true
  blur_faces: false
  anonymize_data: true
